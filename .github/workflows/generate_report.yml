name: Generate AI Readiness Report

on:
  # This allows you to trigger the workflow manually from the GitHub UI
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target Company URL (e.g., https://exeterfinance.com)'
        required: true
        type: string
      crawl_depth:
        description: 'Maximum Crawl Depth'
        required: true
        default: '4'
        type: choice
        options:
          - '2'
          - '3'
          - '4'
          - '5'

jobs:
  analyze_and_report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute AI Consulting Pipeline
        env:
          # Injecting the UI inputs as environment variables for 00_run_pipeline.py
          TARGET_URL: ${{ github.event.inputs.target_url }}
          CRAWL_DEPTH: ${{ github.event.inputs.crawl_depth }}
          
          # Injecting API keys safely from GitHub Secrets
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
        run: |
          python 00_run_pipeline.py

      - name: Upload Executive Report Artifact
        # This step hunts for the generated .docx file and makes it downloadable
        uses: actions/upload-artifact@v4
        with:
          name: AI-Executive-Report
          path: ./**/*_Executive_Report.docx
